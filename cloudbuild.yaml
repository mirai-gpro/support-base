# Cloud Build: support_base → Cloud Run デプロイ
#
# トリガー設定:
#   gcloud builds triggers create github \
#     --repo-name=support-base --repo-owner=mirai-gpro \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml \
#
# 手動実行:
#   # ルートから実行
#   gcloud builds submit --config=cloudbuild.yaml .

substitutions:
  _SERVICE_NAME: support-base
  _REGION: us-central1
  _MEMORY: 1Gi

steps:
  # 1. Docker イメージビルド
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'

  # 2. Container Registry にプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

  # 3. Cloud Run にデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--memory=${_MEMORY}'
      - '--port=8080'
      - '--allow-unauthenticated'
      - '--session-affinity'
      - '--timeout=3600'
      - '--min-instances=1'
      - '--set-env-vars=GEMINI_API_KEY=AIzaSyALLYdnEAXfjk7q_mVBZRGeWRMBTtRrWHI,PROMPTS_BUCKET_NAME=ai-meet-486502-prompts,GOOGLE_PLACES_API_KEY=AIzaSyCGqO4DE9uOMDgN-yRMSZ7qNFCYn-P3k3I,HOTPEPPER_API_KEY=c22031a566715e40,TRIPADVISOR_API_KEY=14516430BFB74E94A198B967C4DDD17F,SUPABASE_URL=https://bisguyfngvlpcgagrdmr.supabase.co,SUPABASE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpc2d1eWZuZ3ZscGNnYWdyZG1yIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2NjcxMDQxMCwiZXhwIjoyMDgyMjg2NDEwfQ.WS4Uf9BrzuLQWZKpMw30K5EDLcEivwfM3G-TnL90Fnw,AUDIO2EXP_SERVICE_URL=https://audio2exp-service-6s2ds5mdba-uc.a.run.app'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

timeout: '600s'
