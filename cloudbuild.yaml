# Cloud Build: support_base → Cloud Run デプロイ
#
# トリガー設定:
#   gcloud builds triggers create github \
#     --repo-name=support-base --repo-owner=mirai-gpro \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml \
#
# 手動実行:
#   # ルートから実行
#   gcloud builds submit --config=cloudbuild.yaml .
#
# 前提: Secret Manager に以下のシークレットを登録済みであること
#   gemini-api-key, google-places-api-key, hotpepper-api-key,
#   tripadvisor-api-key, supabase-key

substitutions:
  _SERVICE_NAME: support-base
  _REGION: us-central1
  _MEMORY: 1Gi

steps:
  # 1. Docker イメージビルド
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'

  # 2. Container Registry にプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

  # 3. Cloud Run にデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--memory=${_MEMORY}'
      - '--port=8080'
      - '--allow-unauthenticated'
      - '--session-affinity'
      - '--timeout=3600'
      - '--min-instances=1'
      - '--set-env-vars=PROMPTS_BUCKET_NAME=ai-meet-486502-prompts,SUPABASE_URL=https://bisguyfngvlpcgagrdmr.supabase.co,AUDIO2EXP_SERVICE_URL=https://audio2exp-service-32596857330.us-central1.run.app'
      - '--set-secrets=GEMINI_API_KEY=gemini-api-key:latest,GOOGLE_PLACES_API_KEY=google-places-api-key:latest,HOTPEPPER_API_KEY=hotpepper-api-key:latest,TRIPADVISOR_API_KEY=tripadvisor-api-key:latest,SUPABASE_KEY=supabase-key:latest'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

timeout: '600s'
