# Cloud Build: support_base → Cloud Run デプロイ
#
# トリガー設定:
#   gcloud builds triggers create github \
#     --repo-name=support-base --repo-owner=mirai-gpro \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml \
#
# 手動実行:
#   # ルートから実行
#   gcloud builds submit --config=cloudbuild.yaml .

substitutions:
  _SERVICE_NAME: support-base
  _REGION: us-central1
  _MEMORY: 1Gi

steps:
  # 0. SHORT_SHA を生成 (手動 submit 対応)
  - name: 'gcr.io/cloud-builders/git'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if [ -z "$SHORT_SHA" ]; then
          echo "$(date +%Y%m%d-%H%M%S)" > /workspace/_tag.txt
        else
          echo "$SHORT_SHA" > /workspace/_tag.txt
        fi
        echo "Image tag: $(cat /workspace/_tag.txt)"

  # 1. Docker イメージビルド
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        TAG=$(cat /workspace/_tag.txt)
        docker build \
          -t gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${TAG} \
          -t gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest \
          .

  # 2. Container Registry にプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        TAG=$(cat /workspace/_tag.txt)
        docker push gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${TAG}
        docker push gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest

  # 3. Cloud Run にデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        TAG=$(cat /workspace/_tag.txt)
        gcloud run deploy ${_SERVICE_NAME} \
          --image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:${TAG} \
          --region=${_REGION} \
          --platform=managed \
          --memory=${_MEMORY} \
          --port=8080 \
          --allow-unauthenticated \
          --session-affinity \
          --timeout=3600 \
          --min-instances=1

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

timeout: '600s'
